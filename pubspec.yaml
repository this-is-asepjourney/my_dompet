name: my_dompet
description: Smart Finance App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # STATE MANAGEMENT
  # =========================
  flutter_riverpod: ^2.6.1

  # =========================
  # FIREBASE
  # =========================
  firebase_core: ^3.15.1
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4

  # =========================
  # OCR & AI
  # =========================
  google_mlkit_text_recognition: ^0.15.0

  # =========================
  # VOICE INPUT
  # =========================
  speech_to_text: ^7.0.0

  # =========================
  # UI & ANIMATION
  # =========================
  fl_chart: ^0.69.0
  lottie: ^3.1.2
  confetti: ^0.8.0

  # =========================
  # NAVIGATION
  # =========================
  go_router: ^14.2.0

  # =========================
  # LOCAL DATABASE
  # =========================
  hive_flutter: ^1.1.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # =========================
  # UTILITIES
  # =========================
  intl: ^0.20.2
  image_picker: ^1.1.2
  uuid: ^4.5.1
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # =========================
  # CODE GENERATOR
  # =========================
  build_runner: ^2.4.12
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true